version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: devtaskr_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-devtaskr}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-devtaskr_password}
      POSTGRES_DB: ${POSTGRES_DB:-devtaskr}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-devtaskr}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: devtaskr_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: devtaskr_backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-devtaskr}:${POSTGRES_PASSWORD:-devtaskr_password}@postgres:5432/${POSTGRES_DB:-devtaskr}
      REDIS_URL: redis://redis:6379/0
      GIT_REPO_PATH: /repo
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - ..:/repo:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  celery_worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: devtaskr_celery
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-devtaskr}:${POSTGRES_PASSWORD:-devtaskr_password}@postgres:5432/${POSTGRES_DB:-devtaskr}
      REDIS_URL: redis://redis:6379/0
      GIT_REPO_PATH: /repo
    volumes:
      - ./backend:/app
      - ..:/repo:ro
    depends_on:
      - backend
      - redis
    command: celery -A app.workers.celery_app worker --loglevel=info

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: devtaskr_frontend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    depends_on:
      - backend

  nginx:
    image: nginx:alpine
    container_name: devtaskr_nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - backend

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: devtaskr_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@devtaskr.com}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin}
    ports:
      - "5050:80"
    depends_on:
      - postgres

volumes:
  postgres_data:
  redis_data:
